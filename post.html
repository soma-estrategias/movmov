<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seu post está pronto</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text-muted: #888;
      --green: #4CAF50;
      --green-dark: #3d9140;
      --blue: #3b82f6;
      --blue-dark: #2563eb;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* Header */
    .header {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .header-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-text {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .header-text strong {
      color: var(--text);
      font-weight: 600;
    }

    /* Card principal */
    .card {
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* Imagem */
    .image-wrapper {
      position: relative;
      width: 100%;
      background: #000;
    }

    .image-wrapper img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .image-placeholder {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 14px;
    }

    .image-placeholder svg {
      opacity: 0.3;
    }

    /* Badge no canto da imagem */
    .image-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Corpo do card */
    .card-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Label */
    .label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* Legenda */
    .legenda-box {
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 14px;
    }

    .legenda-box .label {
      margin-bottom: 10px;
      display: block;
    }

    .legenda-text {
      font-size: 14px;
      line-height: 1.65;
      color: #d4d4d4;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 220px;
      overflow-y: auto;
    }

    .legenda-text::-webkit-scrollbar {
      width: 4px;
    }
    .legenda-text::-webkit-scrollbar-track { background: transparent; }
    .legenda-text::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* Botões */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      text-decoration: none;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--green);
      color: #fff;
    }
    .btn-primary:hover { background: var(--green-dark); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: #2e2e2e; border-color: #444; }

    /* Estado de sucesso do botão copiar */
    .btn-primary.copied {
      background: #166534;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #166534;
      color: #fff;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
      z-index: 100;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #444;
      text-align: center;
    }

    /* Loading */
    .loading {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 60px 0;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsivo desktop */
    @media (min-width: 520px) {
      .actions { flex-direction: row; }
      .btn { width: auto; flex: 1; }
    }
  </style>
</head>
<body>

  <div class="header" style="justify-content:center;">
    <div class="header-dot"></div>
    <p class="header-text"><strong>Seu post está pronto!</strong></p>
  </div>

  <div id="app"></div>

  <div class="toast" id="toast">✓ Legenda copiada!</div>


  <script>
    // ⚠️ Troque pela URL do seu Apps Script implantado
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1zPz_7lHWWY_aZF1NZQfiTRpS0polpJqmwSXGTYjVMdB0ye1AGTxnL7XnQKvn_lTljg/exec';

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    function copiarLegenda(texto) {
      const btn = document.getElementById('btnCopiar');
      navigator.clipboard.writeText(texto).then(() => {
        btn.textContent = '✓  Copiado!';
        btn.classList.add('copied');
        showToast('✓ Legenda copiada!');
        setTimeout(() => {
          btn.innerHTML = iconCopy() + ' Copiar legenda';
          btn.classList.remove('copied');
        }, 2500);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = texto;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('✓ Legenda copiada!');
      });
    }

    async function baixarImagem(url) {
      const btn = document.getElementById('btnBaixar');
      btn.textContent = 'Baixando...';
      btn.disabled = true;
      try {
        const resp = await fetch(url);
        const blob = await resp.blob();
        const objUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = objUrl;
        a.download = 'post.jpg';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(objUrl);
        showToast('✓ Download iniciado!');
      } catch (e) {
        window.open(url, '_blank');
        showToast('Imagem aberta em nova aba');
      }
      btn.innerHTML = iconDownload() + ' Baixar imagem';
      btn.disabled = false;
    }

    function iconCopy() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
    }

    function iconDownload() {
      return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
    }

    function renderCard(arte, legenda) {
      const app = document.getElementById('app');
      const legendaEscaped = legenda.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      // Converte link do Google Drive para URL de visualização direta
      let imgUrl = arte;
      const driveMatch = arte.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (driveMatch) {
        imgUrl = 'https://drive.google.com/uc?export=view&id=' + driveMatch[1];
      }

      app.innerHTML = `
        <div class="card">
          <div class="image-wrapper">
            ${imgUrl
              ? `<img src="${imgUrl}" alt="Arte do post" onclick="baixarImagem('${imgUrl}')" onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.4s ease;cursor:pointer;" title="Clique para baixar" />`
              : `<div class="image-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Imagem não disponível</span></div>`
            }
          </div>

          <div class="card-body">
            ${imgUrl ? `
            <button class="btn btn-secondary" id="btnBaixar" onclick="baixarImagem('${imgUrl}')">
              ${iconDownload()} Baixar imagem
            </button>
            ` : ''}

            ${legenda ? `
            <div class="legenda-box">
              <span class="label">Legenda / Copy</span>
              <div class="legenda-text" id="legendaTexto">${legendaEscaped}</div>
            </div>
            ` : ''}

            <div class="actions">
              ${legenda ? `
              <button class="btn btn-primary" id="btnCopiar" onclick="copiarLegenda(document.getElementById('legendaTexto').innerText)">
                ${iconCopy()} Copiar legenda
              </button>
              ` : ''}
            </div>
          </div>
        </div>
      `;
    }

    function renderError(msg) {
      document.getElementById('app').innerHTML = `
        <div class="card">
          <div class="card-body">
            <p style="color:var(--text-muted);text-align:center;padding:40px 0;">${msg}</p>
          </div>
        </div>
      `;
    }

    function renderLoading() {
      document.getElementById('app').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <p style="color:var(--text-muted);font-size:14px;">Carregando post...</p>
        </div>
      `;
    }

    async function init() {
      const id = new URLSearchParams(window.location.search).get('id');
      if (!id) { renderError('Link inválido.'); return; }

      renderLoading();

      try {
        const url = APPS_SCRIPT_URL + '?action=getPost&id_post=' + encodeURIComponent(id);
        const resp = await fetch(url);
        const json = await resp.json();
        if (!json.success) throw new Error(json.error || 'Erro desconhecido');
        renderCard(json.data.link_midia, json.data.legenda_post);
      } catch (e) {
        renderError('Não foi possível carregar o post. Tente novamente.');
      }
    }

    init();
  </script>
</body>
</html>
